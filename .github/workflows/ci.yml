name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static import/build check
        run: python -m compileall app

      - name: Lint
        run: ruff check app tests

      - name: Dependency vulnerability scan
        run: pip-audit --strict

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          PYTHONPATH: .
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=30

      - name: Security Tests
        env:
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          PYTHONPATH: .
        run: pytest tests/ -m security --strict-markers -v

      - name: Alembic migration check
        env:
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          PYTHONPATH: .
        run: python -c "from app.database import Base; from app.models import *; print('Models loaded OK')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript & Build
        run: npm run build

      - name: Lint
        run: npm run lint

