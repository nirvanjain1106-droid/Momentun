name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Static import/build check
        run: python -m compileall app

      - name: Lint
        run: ruff check app tests

      - name: Dependency vulnerability scan
        run: pip-audit --strict
        continue-on-error: true  # advisory — don't block CI on known-but-unpatched vulns

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          PYTHONPATH: .
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=30

      - name: Alembic migration check
        env:
          SECRET_KEY: ci-secret-key-at-least-32-characters-long
          PYTHONPATH: .
        run: python -c "from app.database import Base; from app.models import *; print('Models loaded OK')"
